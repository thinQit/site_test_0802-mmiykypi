name: Build and Deploy
on:
  push:
    branches: [main]


jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      container_app_url: ' + _GOpen + ' steps.tf-output.outputs.url ' + _GClose + '
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="storage_account_name=' + _GOpen + ' secrets.TF_STATE_STORAGE_ACCOUNT ' + _GClose + '" \
            -backend-config="container_name=' + _GOpen + ' secrets.TF_STATE_CONTAINER ' + _GClose + '" \
            -backend-config="key=' + _GOpen + ' secrets.CODEX_PROJECT_ID ' + _GClose + '.tfstate" \
            -backend-config="resource_group_name=' + _GOpen + ' secrets.RESOURCE_GROUP ' + _GClose + '" \
            -backend-config="subscription_id=' + _GOpen + ' secrets.AZURE_SUBSCRIPTION_ID ' + _GClose + '" \
            -backend-config="client_id=' + _GOpen + ' secrets.AZURE_CLIENT_ID ' + _GClose + '" \
            -backend-config="client_secret=' + _GOpen + ' secrets.AZURE_CLIENT_SECRET ' + _GClose + '" \
            -backend-config="tenant_id=' + _GOpen + ' secrets.AZURE_TENANT_ID ' + _GClose + '"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="subscription_id=' + _GOpen + ' secrets.AZURE_SUBSCRIPTION_ID ' + _GClose + '" \
            -var="sp_tenant_id=' + _GOpen + ' secrets.AZURE_TENANT_ID ' + _GClose + '" \
            -var="sp_client_id=' + _GOpen + ' secrets.AZURE_CLIENT_ID ' + _GClose + '" \
            -var="sp_client_secret=' + _GOpen + ' secrets.AZURE_CLIENT_SECRET ' + _GClose + '" \
            -var="resource_group=' + _GOpen + ' secrets.RESOURCE_GROUP ' + _GClose + '" \
            -var="location=' + _GOpen + ' secrets.AZURE_LOCATION ' + _GClose + '" \
            -var="container_app_name=' + _GOpen + ' secrets.CONTAINER_APP_NAME ' + _GClose + '" \
            -var="container_apps_env_name=' + _GOpen + ' secrets.CONTAINER_APPS_ENV ' + _GClose + '" \
            -var="acr_name=' + _GOpen + ' secrets.ACR_NAME ' + _GClose + '" \
            -var="acr_login_server=' + _GOpen + ' secrets.ACR_LOGIN_SERVER ' + _GClose + '"

      - name: Get Terraform Outputs
        id: tf-output
        working-directory: terraform
        run: echo "url=$(terraform output -raw container_app_url)" >> $GITHUB_OUTPUT

  deploy:
    name: Build & Deploy from Source
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"' + _GOpen + ' secrets.AZURE_CLIENT_ID ' + _GClose + '","clientSecret":"' + _GOpen + ' secrets.AZURE_CLIENT_SECRET ' + _GClose + '","subscriptionId":"' + _GOpen + ' secrets.AZURE_SUBSCRIPTION_ID ' + _GClose + '","tenantId":"' + _GOpen + ' secrets.AZURE_TENANT_ID ' + _GClose + '"}'

      - name: Build and Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ' + _GOpen + ' github.workspace ' + _GClose + '
          acrName: ' + _GOpen + ' secrets.ACR_NAME ' + _GClose + '
          acrUsername: ' + _GOpen + ' secrets.ACR_NAME ' + _GClose + '
          acrPassword: ' + _GOpen + ' secrets.ACR_PASSWORD ' + _GClose + '
          containerAppName: ' + _GOpen + ' secrets.CONTAINER_APP_NAME ' + _GClose + '
          resourceGroup: ' + _GOpen + ' secrets.RESOURCE_GROUP ' + _GClose + '
          runtimeStack: "node:20"
          targetPort: 3000
